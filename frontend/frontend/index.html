<!DOCTYPE html>
<html>
<head>
  <title>QuotaFootball</title>
</head>
<body>

<h1>QuotaFootball ⚽</h1>

<input id="team1" placeholder="Squadra 1">
<input id="team2" placeholder="Squadra 2">

<button onclick="predict()">Predici</button>

<p id="result"></p>

<script>
async function predict() {
  const team1 = document.getElementById("team1").value;
  const team2 = document.getElementById("team2").value;

  const res = await fetch(
    API_URL + "/predict?team1=" + team1 + "&team2=" + team2
  );

  const data = await res.json();

  document.getElementById("result").innerHTML = `
    <h3>${data.match}</h3>

    <h4>🏆 1X2</h4>
    <p>1: ${data.odds["1"]} | X: ${data.odds["X"]} | 2: ${data.odds["2"]}</p>

    <h4>⚽ Over/Under 2.5</h4>
    <p>Over: ${data.over_under.over_2_5} | Under: ${data.over_under.under_2_5}</p>

    <h4>🔥 Possibile marcatore</h4>
    <p>${data.top_scorer_prediction}</p>
  `;
}
</script>

</body>
</html>
