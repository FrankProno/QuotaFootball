<!DOCTYPE html>
<html>
<head>
  <title>QuotaFootball</title>
</head>
<body>

<h1>QuotaFootball ⚽</h1>

<select id="team1"></select>
<select id="team2"></select>

<button onclick="predict()">Predici</button>

<p id="result"></p>

<script>
const API_URL = "https://quotafootball-production.up.railway.app";

async function loadTeams() {
  try {
    console.log("Carico squadre...");

    const response = await fetch(API_URL + "/teams");

    if (!response.ok) {
      throw new Error("Errore risposta API");
    }

    const teams = await response.json();

    console.log("Squadre:", teams);

    const team1Select = document.getElementById("team1");
    const team2Select = document.getElementById("team2");

    // pulisce menu (importante)
    team1Select.innerHTML = "";
    team2Select.innerHTML = "";

    teams.forEach(team => {
      const opt1 = document.createElement("option");
      opt1.value = team.name;
      opt1.textContent = team.name;

      const opt2 = document.createElement("option");
      opt2.value = team.name;
      opt2.textContent = team.name;

      team1Select.appendChild(opt1);
      team2Select.appendChild(opt2);
    });

  } catch (error) {
    console.error("Errore loadTeams:", error);
    document.getElementById("result").innerText = "Errore caricamento squadre";
  }
}

async function predict() {
  const team1 = document.getElementById("team1").value;
  const team2 = document.getElementById("team2").value;

  const res = await fetch(
    API_URL + "/predict?team1=" + team1 + "&team2=" + team2
  );

  const data = await res.json();

  document.getElementById("result").innerHTML = `
    <h3>${data.match}</h3>
    <p>🏆 Quote</p>
    <p>1: ${data.odds["1"]}</p>
    <p>X: ${data.odds["X"]}</p>
    <p>2: ${data.odds["2"]}</p>
  `;
}

loadTeams();
</script>

</body>
</html>
