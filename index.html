<!DOCTYPE html>
<html>
<head>
    <title>QuotaFootball</title>
</head>
<body>

<h1>QuotaFootball ⚽</h1>

<!-- MENU A TENDINA -->
<select id="team1">
    <option value="Inter">Inter</option>
    <option value="Juventus">Juventus</option>
    <option value="Milan">Milan</option>
    <option value="Napoli">Napoli</option>
    <option value="Roma">Roma</option>
    <option value="Lazio">Lazio</option>
    <option value="Atalanta">Atalanta</option>
    <option value="Fiorentina">Fiorentina</option>
</select>

<select id="team2">
    <option value="Inter">Inter</option>
    <option value="Juventus">Juventus</option>
    <option value="Milan">Milan</option>
    <option value="Napoli">Napoli</option>
    <option value="Roma">Roma</option>
    <option value="Lazio">Lazio</option>
    <option value="Atalanta">Atalanta</option>
    <option value="Fiorentina">Fiorentina</option>
</select>

<br><br>

<button onclick="predict()">Predici</button>

<div id="result"></div>

<script>
function predict() {
    const team1 = document.getElementById("team1").value;
    const team2 = document.getElementById("team2").value;

    fetch(`https://quotacalcio-produzione.up.railway.app/predict?team1=${team1}&team2=${team2}`)
        .then(response => response.json())
        .then(data => {
            document.getElementById("result").innerHTML = `
                <h3>${data.match}</h3>
                <p>Prediction: ${data.prediction}</p>
                <p>Confidence: ${data.confidence}</p>
            `;
        })
        .catch(error => {
            document.getElementById("result").innerHTML = "Errore nel collegamento API";
            console.error(error);
        });
}
</script>

</body>
</html>
