<!DOCTYPE html>
<html>
<head>
  <title>QuotaFootball</title>
</head>
<body>

<h1>QuotaFootball ⚽</h1>

<select id="team1"></select>
<select id="team2"></select>

<button onclick="predict()">Predici</button>

<p id="result"></p>

<script>
const API_URL = "https://quotafootball-production.up.railway.app";

async function loadTeams() {
  try {
    const response = await fetch(API_URL + "/teams");
    const teams = await response.json();

    const team1Select = document.getElementById("team1");
    const team2Select = document.getElementById("team2");

    teams.forEach(team => {
      const option1 = document.createElement("option");
      option1.value = team.name;
      option1.text = team.name;

      const option2 = document.createElement("option");
      option2.value = team.name;
      option2.text = team.name;

      team1Select.appendChild(option1);
      team2Select.appendChild(option2);
    });

  } catch (error) {
    document.getElementById("result").innerText = "Errore caricamento squadre";
  }
}

async function predict() {
  const team1 = document.getElementById("team1").value;
  const team2 = document.getElementById("team2").value;

  try {
    const response = await fetch(
      API_URL + "/predict?team1=" + team1 + "&team2=" + team2
    );

    const data = await response.json();

    document.getElementById("result").innerText =
      data.match + " → " + data.prediction + " (" + data.confidence + ")";
  } catch (error) {
    document.getElementById("result").innerText = "Errore nel collegamento API";
  }
}

loadTeams();
</script>

</body>
</html>
