<!DOCTYPE html>
<html>
<head>
  <title>QuotaFootball</title>
</head>
<body>

<h1>QuotaFootball ⚽</h1>

<label>Stagione:</label>
<select id="season" onchange="loadTeams()">
  <option value="2025">2025/2026</option>
  <option value="2024">2024/2025</option>
  <option value="2023">2023/2024</option>
</select>

<br><br>

<select id="team1"></select>
<select id="team2"></select>

<br><br>

<button onclick="getOdds()">Mostra Quote</button>

<div id="result"></div>

<script>
const API_URL = "https://quotafootball-production.up.railway.app";

async function loadTeams() {
  const season = document.getElementById("season").value;
  const team1 = document.getElementById("team1");
  const team2 = document.getElementById("team2");

  team1.innerHTML = "";
  team2.innerHTML = "";

  const res = await fetch(`${API_URL}/teams?season=${season}`);
  const data = await res.json();

  if (!data.teams || data.teams.length === 0) {
    document.getElementById("result").innerHTML = "Nessuna squadra trovata.";
    return;
  }

  data.teams.forEach(team => {
    team1.add(new Option(team.shortName || team.name, team.name));
    team2.add(new Option(team.shortName || team.name, team.name));
  });

  team2.selectedIndex = 1;
}

async function getOdds() {
  const team1 = document.getElementById("team1").value;
  const team2 = document.getElementById("team2").value;
  const result = document.getElementById("result");

  if (team1 === team2) {
    result.innerHTML = "Seleziona due squadre diverse.";
    return;
  }

  result.innerHTML = "Caricamento quote...";

  const res = await fetch(
    `${API_URL}/odds?team1=${encodeURIComponent(team1)}&team2=${encodeURIComponent(team2)}`
  );

  const data = await res.json();

  if (data.error) {
    result.innerHTML = "Errore quote: " + data.error;
    return;
  }

  if (!data.results || data.results.length === 0) {
    result.innerHTML = "Nessuna quota trovata per questa partita.";
    return;
  }

  let html = `<h2>${team1} vs ${team2}</h2>`;

  data.results.forEach(book => {
    html += `<div style="margin:15px;padding:15px;background:#eee;border-radius:10px;">
      <strong>${book.bookmaker}</strong><br>
    `;

    book.odds.forEach(odd => {
      html += `${odd.name}: ${odd.price}<br>`;
    });

    html += `</div>`;
  });

  result.innerHTML = html;
}

loadTeams();
</script>

</body>
</html>
