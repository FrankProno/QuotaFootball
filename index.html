<!DOCTYPE html>
<html>
<head>
  <title>QuotaFootball</title>
</head>
<body>

<h1>QuotaFootball ⚽</h1>

<select id="team1"></select>
<select id="team2"></select>

<br><br>

<button onclick="getOdds()">Predici</button>

<div id="result"></div>

<script>
const API_URL = "https://quotafootball-production.up.railway.app";

const logos = {
  "Bet365": "https://upload.wikimedia.org/wikipedia/en/6/6b/Bet365_logo.svg",
  "William Hill": "https://upload.wikimedia.org/wikipedia/en/thumb/5/5c/William_Hill_logo.svg/512px-William_Hill_logo.svg.png",
  "Betfair": "https://upload.wikimedia.org/wikipedia/en/thumb/5/5a/Betfair_logo.svg/512px-Betfair_logo.svg.png",
  "Unibet": "https://upload.wikimedia.org/wikipedia/en/thumb/1/1b/Unibet_logo.svg/512px-Unibet_logo.svg.png"
};

async function loadTeams() {
  try {
    const res = await fetch(API_URL + "/teams");
    const teams = await res.json();

    const t1 = document.getElementById("team1");
    const t2 = document.getElementById("team2");

    t1.innerHTML = "";
    t2.innerHTML = "";

    teams.forEach(team => {
      let opt1 = new Option(team, team);
      let opt2 = new Option(team, team);
      t1.add(opt1);
      t2.add(opt2);
    });

  } catch (err) {
    document.getElementById("result").innerText = "Errore caricamento squadre";
  }
}

async function getOdds() {
  const team1 = document.getElementById("team1").value;
  const team2 = document.getElementById("team2").value;

  try {
    const res = await fetch(`${API_URL}/odds?team1=${team1}&team2=${team2}`);
    const data = await res.json();

    let html = "";

    if (!data || data.length === 0) {
      html = "Nessuna quota trovata";
    } else {
      data.forEach(book => {
        const logo = logos[book.bookmaker] || "";

        html += `
          <div style="margin-bottom:20px;">
            <img src="${logo}" width="60"><br>
            <b>${book.bookmaker}</b><br>
            1: ${book.odds[0].price} |
            X: ${book.odds[1].price} |
            2: ${book.odds[2].price}
          </div>
        `;
      });
    }

    document.getElementById("result").innerHTML = html;

  } catch (err) {
    document.getElementById("result").innerText = "Errore nel collegamento API";
  }
}

loadTeams();
</script>

</body>
</html>
